server:
  port: ${PORT:8080}

spring:
  application:
    name: payment-service
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:/home/user/GitHub/origem-payment-system/database/database;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  rabbitmq:
    addresses: ${RABBIT_URL:amqp://localhost:5672}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
