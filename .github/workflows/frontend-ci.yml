name: CI - Origem Pay

on:
  push:
    branches: [ "main" ]
    paths:
      - 'origem-pay/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './origem-pay/package-lock.json'

      - name: Install and Build Angular
        working-directory: ./origem-pay
        run: |
          npm install
          # Cria o env.js na nova pasta 'public' para o build v17+
          mkdir -p public
          echo "window.env = {};" > public/env.js
          npm run build -- --configuration production

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./origem-pay
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/origem-pay:latest
