<header class="main-header">
  <div class="logo">Origem Pay</div>
  <button class="btn-logout" routerLink="/payments">Cancelar</button>
</header>

<main class="content-wrapper">
  <div class="form-card">
    <div class="form-header">
      <h2>Novo Pagamento</h2>
      <p>Preencha os dados abaixo para o processamento.</p>
    </div>

    <form class="custom-form">
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" placeholder="Ex: Manutenção de Servidores">
      </div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label>Valor (R$)</label>
          <input type="number" placeholder="0,00">
        </div>

        <div class="form-group flex-1">
          <label>Status Inicial</label>
          <select>
            <option value="PENDING">Pendente</option>
            <option value="PAID">Pago</option>
          </select>
        </div>
      </div>

      <button type="button" class="btn-primary-lg" routerLink="/payments">
        Salvar Pagamento
      </button>
      
      <button type="button" class="btn-text" routerLink="/dashboard">
        Voltar ao Painel
      </button>
    </form>
  </div>
</main>
