<header class="main-header">
  <div class="logo">Origem Pay</div>
  <button class="btn-logout" routerLink="/payments">Cancelar</button>
</header>

<main class="content-wrapper">
  <div class="form-card">
    <div class="form-header">
      <h2>Novo Pagamento</h2>
      <p>Preencha os dados abaixo para o processamento.</p>
    </div>

    <form class="custom-form" (ngSubmit)="onSubmit()" #paymentForm="ngForm">
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" 
               name="descricao" 
               [(ngModel)]="novoPagamento.descricao" 
               required 
               placeholder="Ex: Manutenção de Servidores">
      </div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label>Valor (R$)</label>
          <input type="number" 
                 name="valor" 
                 [(ngModel)]="novoPagamento.valor" 
                 required 
                 placeholder="0,00">
        </div>

        <div class="form-group flex-1">
          <label>Método</label>
          <select name="metodo" [(ngModel)]="novoPagamento.metodo">
            <option value="PIX">PIX</option>
            <option value="BOLETO">Boleto</option>
            <option value="CARTAO">Cartão</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary-lg" [disabled]="!paymentForm.valid">
        Salvar Pagamento
      </button>
      
      <button type="button" class="btn-text" routerLink="/dashboard">
        Voltar ao Painel
      </button>
    </form>
  </div>
</main>
